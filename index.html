<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加班申請單 - Overtime Request Form</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- html2canvas for Image Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- SheetJS for Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Noto+Sans+Thai:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', 'Noto Sans Thai', sans-serif;
            background-color: #f3f4f6;
        }

        .form-container {
            background-color: white;
            padding: 30px;
            width: 1050px; 
            margin-left: auto;
            margin-right: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th, td {
            border: 1px solid #000;
            padding: 4px;
            text-align: center;
            vertical-align: middle;
            height: 45px;
            overflow: hidden;
        }

        /* 統一選單與輸入框樣式 */
        select, input {
            width: 100%;
            height: 100%;
            border: none;
            outline: none;
            background: transparent;
            text-align: center;
            text-align-last: center;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            padding: 0;
            margin: 0;
            display: block;
            line-height: 1.5;
            font-size: 13px;
        }

        /* 針對 Firefox 的修正 */
        select {
            -moz-appearance: none;
            text-indent: 0.01px;
            text-overflow: '';
        }

        .no-print-area {
            display: flex;
        }

        /* 翻譯中樣式 */
        .translating {
            background-color: #f0f9ff !important;
            color: #0369a1;
            font-style: italic;
        }

        @media print {
            .no-print-area {
                display: none;
            }
            body {
                background-color: white;
                padding: 0;
            }
            .form-container {
                box-shadow: none;
                margin: 0;
                width: 100%;
            }
        }
    </style>
</head>
<body class="p-4">

    <div class="max-w-6xl mx-auto">
        <!-- 操作按鈕區 -->
        <div class="mb-6 flex flex-wrap gap-4 no-print-area">
            <button onclick="exportToImage()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded shadow-md transition flex items-center gap-2">
                匯出圖片 (Export Image)
            </button>
            <button onclick="exportToExcel()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded shadow-md transition flex items-center gap-2">
                匯出 Excel (Export XLSX)
            </button>
            <button onclick="window.print()" class="bg-gray-600 hover:bg-gray-700 text-white px-6 py-2 rounded shadow-md transition flex items-center gap-2">
                列印 (Print)
            </button>
        </div>

        <!-- 表單主體 -->
        <div id="ot-form" class="form-container shadow-xl">
            <!-- 公司標題 -->
            <div class="text-center mb-4">
                <h2 class="text-2xl font-bold text-gray-800">大量科技股份有限公司</h2>
                <h1 class="text-xl font-bold text-gray-700">加班申請單 (แบบฟอร์มขอทำงานล่วงเวลา)</h1>
            </div>

            <!-- 日期與部門欄位 -->
            <div class="flex justify-between mb-4 px-2">
                <div class="flex items-center">
                    <span class="font-bold mr-2 text-sm">日期 (วันที่):</span>
                    <input type="date" id="doc_date" class="border-b border-black w-40 text-left px-2 h-auto">
                </div>
                <div>
                    <span class="font-bold text-gray-800 underline text-sm">單位：管理部 (Unit: HR Department)</span>
                </div>
            </div>

            <!-- 表格內容 -->
            <table>
                <thead class="bg-gray-100 text-[12px]">
                    <tr>
                        <th class="w-20 font-bold">工號<br><span class="text-[9px] text-gray-500 font-normal">รหัสพนักงาน</span></th>
                        <th class="w-24 font-bold">姓名<br><span class="text-[9px] text-gray-500 font-normal">ชื่อ</span></th>
                        <th class="w-20 font-bold">月/日<br><span class="text-[9px] text-gray-500 font-normal">เดือน/วัน</span></th>
                        <th class="w-48 font-bold" colspan="2">開始/結束時間 (24H)<br><span class="text-[9px] text-gray-500 font-normal">เวลาเริ่มต้น - สิ้นสุด</span></th>
                        <th class="w-16 font-bold">時數<br><span class="text-[9px] text-gray-500 font-normal">ชม.</span></th>
                        <th class="w-44 font-bold">工作內容<br><span class="text-[9px] text-gray-500 font-normal">ทำงายอะไร</span></th>
                        <th class="font-bold">備註 (支援泰文自動翻譯)<br><span class="text-[9px] text-gray-500 font-normal">หมายเหตุ (แปลอัตโนมัติ)</span></th>
                    </tr>
                </thead>
                <tbody id="ot-tbody">
                    <!-- JS 將生成 10 行 -->
                </tbody>
            </table>

            <!-- 表格底部的生成時間 -->
            <div class="mt-4 text-[10px] text-gray-400 text-right italic">
                Generated on: <span id="gen-time"></span>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; // 使用環境提供的 API Key
        document.getElementById('gen-time').innerText = new Date().toLocaleString();

        const empMap = {
            "13031": "阿凱Krai",
            "13056": "娜萌Mon"
        };

        const jobOptions = [
            "管理部/แผนกบริหาร",
            "支援資材部/แผนกวัสดุ",
            "支援生產部/แผนกผลิต"
        ];

        // 偵測是否包含泰文字元
        function containsThai(text) {
            return /[\u0E00-\u0E7F]/.test(text);
        }

        // 翻譯函數 (實作指數退避重試)
        async function translateText(text, retries = 5, delay = 1000) {
            const systemPrompt = "你是一個專業的翻譯助手。請將使用者輸入的泰文備註翻譯成台灣常用的繁體中文。只需回傳翻譯結果，不要有任何解釋。";
            const userQuery = `翻譯此泰文內容為繁體中文: "${text}"`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userQuery }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });

                if (!response.ok) throw new Error('API Error');

                const result = await response.json();
                return result.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "";
            } catch (error) {
                if (retries > 0) {
                    await new Promise(resolve => setTimeout(resolve, delay));
                    return translateText(text, retries - 1, delay * 2);
                }
                return "";
            }
        }

        // 處理翻譯事件
        async function handleTranslation(input) {
            const originalText = input.value.trim();
            // 如果為空、不含泰文、或是已經翻譯過了，則不處理
            if (!originalText || !containsThai(originalText) || originalText.includes('(')) return;

            input.classList.add('translating');
            const placeholder = originalText + " (正在翻譯中...)";
            input.value = placeholder;

            const translated = await translateText(originalText);

            input.classList.remove('translating');
            if (translated) {
                input.value = `${originalText} (${translated})`;
            } else {
                input.value = originalText; // 失敗則恢復原文
            }
        }

        // 生成 10 行數據
        function initTable() {
            const tbody = document.getElementById('ot-tbody');
            for (let i = 0; i < 10; i++) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <select class="emp-id" onchange="handleRowEmpChange(this)">
                            <option value="">請選擇</option>
                            ${Object.keys(empMap).map(id => `<option value="${id}">${id}</option>`).join('')}
                        </select>
                    </td>
                    <td class="bg-gray-50">
                        <input type="text" class="emp-name" readonly placeholder="-">
                    </td>
                    <td><input type="text" class="ot-day" placeholder="MM/DD"></td>
                    <td class="w-24">
                        <select class="start-time font-mono" onchange="calculateRowHours(this)">
                            <option value="">開始เริ่ม</option>
                            ${generateTimeOptions()}
                        </select>
                    </td>
                    <td class="w-24">
                        <select class="end-time font-mono" onchange="calculateRowHours(this)">
                            <option value="">結束สิ้นสุด</option>
                            ${generateTimeOptions()}
                        </select>
                    </td>
                    <td class="bg-blue-50">
                        <input type="number" class="total-hours font-bold text-blue-700" readonly>
                    </td>
                    <td>
                        <select class="job-desc">
                            <option value="">請選擇</option>
                            ${jobOptions.map(opt => `<option value="${opt}">${opt}</option>`).join('')}
                        </select>
                    </td>
                    <td><input type="text" class="remarks" onblur="handleTranslation(this)" placeholder="輸入泰文自動翻譯"></td>
                `;
                tbody.appendChild(tr);
            }
        }

        function generateTimeOptions() {
            let options = '';
            for (let h = 0; h < 24; h++) {
                for (let m = 0; m < 60; m += 30) {
                    const time = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
                    options += `<option value="${time}">${time}</option>`;
                }
            }
            return options;
        }

        function handleRowEmpChange(selectElement) {
            const row = selectElement.closest('tr');
            const nameInput = row.querySelector('.emp-name');
            nameInput.value = empMap[selectElement.value] || "";
        }

        function calculateRowHours(selectElement) {
            const row = selectElement.closest('tr');
            const start = row.querySelector('.start-time').value;
            const end = row.querySelector('.end-time').value;
            const totalInput = row.querySelector('.total-hours');

            if (start && end) {
                const startTime = new Date(`2024-01-01 ${start}`);
                let endTime = new Date(`2024-01-01 ${end}`);
                if (endTime <= startTime) {
                    endTime = new Date(`2024-01-02 ${end}`);
                }
                const diffMs = endTime - startTime;
                const diffHrs = diffMs / (1000 * 60 * 60);
                totalInput.value = diffHrs.toFixed(1);
            }
        }

        async function exportToImage() {
            const element = document.getElementById('ot-form');
            const canvas = await html2canvas(element, {
                scale: 2,
                useCORS: true,
                backgroundColor: "#ffffff",
                onclone: (clonedDoc) => {
                    const selects = clonedDoc.querySelectorAll('select');
                    selects.forEach(s => s.style.lineHeight = "1.5");
                }
            });
            const link = document.createElement('a');
            const date = document.getElementById('doc_date').value || 'New';
            link.download = `加班單_${date}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        function exportToExcel() {
            const rows = document.querySelectorAll('#ot-tbody tr');
            const dataRows = [];
            rows.forEach(row => {
                const id = row.querySelector('.emp-id').value;
                if (id) {
                    dataRows.push([
                        id,
                        row.querySelector('.emp-name').value,
                        row.querySelector('.ot-day').value,
                        row.querySelector('.start-time').value,
                        row.querySelector('.end-time').value,
                        row.querySelector('.total-hours').value,
                        row.querySelector('.job-desc').value,
                        row.querySelector('.remarks').value
                    ]);
                }
            });

            const tableData = [
                ["大量科技股份有限公司"],
                ["加班申請單 (แบบฟอร์มขอทำงานล่วงเวลา)"],
                [`日期: ${document.getElementById('doc_date').value}`, "", "", "", "", "", "單位：管理部"],
                ["工號", "姓名", "月/日", "開始時間", "結束時間", "加班時數", "工作內容", "備註"],
                ...dataRows
            ];
            const worksheet = XLSX.utils.aoa_to_sheet(tableData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Overtime");
            XLSX.writeFile(workbook, `多人加班單_${document.getElementById('doc_date').value}.xlsx`);
        }

        initTable();
    </script>
</body>
</html>
