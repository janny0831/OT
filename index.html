<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加班申請單 - Firebase 雲端版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Noto+Sans+Thai:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', 'Noto Sans Thai', sans-serif; background-color: #f3f4f6; }
        .form-container { background-color: white; padding: 30px; width: 1100px; margin: 20px auto; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #000; padding: 8px; text-align: center; }
        input, select { width: 100%; border: none; outline: none; text-align: center; background: transparent; }
        input:focus { background-color: #fefce8; }
        .no-export { display: table-cell; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

    <div class="no-print max-w-[1100px] mx-auto mt-6 flex flex-wrap gap-4 justify-between items-center bg-white p-4 rounded-lg shadow-sm">
        <div class="flex gap-2">
            <button onclick="addRow()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded shadow transition">＋ 新增一列</button>
            <button onclick="saveToCloud()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded shadow transition">☁ 儲存至雲端</button>
        </div>
        <div class="flex gap-2">
            <button onclick="exportToExcel()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded shadow transition">匯出 Excel</button>
            <button onclick="exportToImage()" class="bg-purple-500 hover:bg-purple-600 text-white px-4 py-2 rounded shadow transition">匯出圖片 (PNG)</button>
            <button onclick="window.print()" class="bg-gray-700 hover:bg-gray-800 text-white px-4 py-2 rounded shadow transition">列印表單</button>
        </div>
    </div>

    <div id="capture-area" class="form-container">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold">大量科技股份有限公司</h1>
            <h2 class="text-xl font-bold mt-1">加班申請單 (แบบฟอร์มขอทำงานล่วงเวลา)</h2>
        </div>

        <div class="flex justify-between mb-4 px-2">
            <div class="flex items-center">
                <span class="font-bold">日期 (วันที่):</span>
                <input type="date" id="doc_date" class="ml-2 border-b border-black w-40 text-left">
            </div>
            <div class="font-bold">單位 (แผนก)：管理部</div>
        </div>

        <table id="ot_table">
            <thead class="bg-gray-50">
                <tr>
                    <th class="w-20">工號<br><small>รหัสพนักงาน</small></th>
                    <th class="w-32">姓名<br><small>ชื่อ-นามสกุล</small></th>
                    <th class="w-32">月/日<br><small>เดือน/วันที่</small></th>
                    <th class="w-24">開始時間<br><small>เวลาเริ่ม</small></th>
                    <th class="w-24">結束時間<br><small>เวลาสิ้นสุด</small></th>
                    <th class="w-20">加班時數<br><small>ชม.OT</small></th>
                    <th>工作內容<br><small>ลักษณะงานที่ทำ</small></th>
                    <th class="w-32">備註<br><small>หมายเหตุ</small></th>
                    <th class="no-print w-16">操作</th>
                </tr>
            </thead>
            <tbody id="ot_tbody">
                </tbody>
        </table>

        <div class="grid grid-cols-4 mt-12 gap-4 text-center">
            <div class="border-t border-black pt-2">核准 (อนุมัติ)</div>
            <div class="border-t border-black pt-2">審核 (審核)</div>
            <div class="border-t border-black pt-2">主管 (ผู้จัดการ)</div>
            <div class="border-t border-black pt-2">申請人 (ผู้สมัคร)</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // Firebase 配置資訊
        const firebaseConfig = {
            apiKey: "AIzaSyB-PCNtremx3bmUZk-tk7LLo-zuIaD4yn8",
            authDomain: "thailand-26530.firebaseapp.com",
            projectId: "thailand-26530",
            storageBucket: "thailand-26530.firebasestorage.app",
            messagingSenderId: "383864827104",
            appId: "1:383864827104:web:3dfcebf1045debf494f485",
            measurementId: "G-HCRB6KC4CN"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "overtimeSystem", "currentSheet");

        // 頁面初始化
        window.addEventListener('DOMContentLoaded', () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('doc_date').value = today;
            
            // 監聽雲端資料即時同步
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.rows) renderTableFromData(data.rows);
                    if (data.docDate) document.getElementById('doc_date').value = data.docDate;
                } else {
                    // 若雲端沒資料，預設顯示 5 列
                    for(let i=0; i<5; i++) addRow();
                }
            });
        });

        // 將資料渲染至表格
        function renderTableFromData(rows) {
            const tbody = document.getElementById('ot_tbody');
            tbody.innerHTML = '';
            rows.forEach(rowData => addRow(rowData));
        }

        // 新增列的函式 (掛載到 window 以便 onclick 呼叫)
        window.addRow = function(data = {}) {
            const tbody = document.getElementById('ot_tbody');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><input type="text" class="emp-id" value="${data.id || ''}" placeholder="130xx"></td>
                <td><input type="text" class="emp-name" value="${data.name || ''}"></td>
                <td>
                    <div class="flex flex-col">
                        <input type="text" class="ot-day" value="${data.day || ''}" placeholder="05/20">
                        <select class="day-type-select text-[10px] text-blue-600">
                            <option value="Normal" ${data.type==='Normal'?'selected':''}>平日</option>
                            <option value="Holiday" ${data.type==='Holiday'?'selected':''}>假日</option>
                        </select>
                    </div>
                </td>
                <td><input type="time" class="start-time" value="${data.start || ''}" onchange="calculateHours(this)"></td>
                <td><input type="time" class="end-time" value="${data.end || ''}" onchange="calculateHours(this)"></td>
                <td><input type="number" step="0.5" class="total-hours" value="${data.hours || ''}" readonly></td>
                <td><input type="text" class="job-desc text-left px-2" value="${data.desc || ''}"></td>
                <td><input type="text" class="remarks" value="${data.remarks || ''}"></td>
                <td class="no-print"><button onclick="this.parentElement.parentElement.remove()" class="text-red-500 hover:text-red-700 font-bold">✕</button></td>
            `;
            tbody.appendChild(row);
        };

        // 計算時數
        window.calculateHours = function(input) {
            const row = input.closest('tr');
            const start = row.querySelector('.start-time').value;
            const end = row.querySelector('.end-time').value;
            if (start && end) {
                let s = new Date(`2024-01-01T${start}`);
                let e = new Date(`2024-01-01T${end}`);
                if (e < s) e.setDate(e.getDate() + 1);
                let diff = (e - s) / (1000 * 60 * 60);
                // 扣除休息時間邏輯 (範例：若跨越12:00-13:00或17:00-18:00可在此加入)
                row.querySelector('.total-hours').value = diff.toFixed(1);
            }
        };

        // 儲存至雲端 Firebase
        window.saveToCloud = async function() {
            const rows = [];
            document.querySelectorAll('#ot_tbody tr').forEach(tr => {
                rows.push({
                    id: tr.querySelector('.emp-id').value,
                    name: tr.querySelector('.emp-name').value,
                    day: tr.querySelector('.ot-day').value,
                    type: tr.querySelector('.day-type-select').value,
                    start: tr.querySelector('.start-time').value,
                    end: tr.querySelector('.end-time').value,
                    hours: tr.querySelector('.total-hours').value,
                    desc: tr.querySelector('.job-desc').value,
                    remarks: tr.querySelector('.remarks').value
                });
            });

            try {
                await setDoc(docRef, {
                    rows: rows,
                    docDate: document.getElementById('doc_date').value,
                    lastUpdate: new Date().toISOString()
                });
                alert('雲端儲存成功！');
            } catch (e) {
                console.error("Error saving document: ", e);
                alert('儲存失敗，請檢查網路或 Firebase 設定。');
            }
        };

        // 匯出 Excel
        window.exportToExcel = function() {
            const dataRows = [];
            document.querySelectorAll('#ot_tbody tr').forEach(row => {
                dataRows.push([
                    row.querySelector('.emp-id').value,
                    row.querySelector('.emp-name').value,
                    row.querySelector('.ot-day').value + ` (${row.querySelector('.day-type-select').value})`,
                    row.querySelector('.start-time').value,
                    row.querySelector('.end-time').value,
                    row.querySelector('.total-hours').value,
                    row.querySelector('.job-desc').value,
                    row.querySelector('.remarks').value
                ]);
            });

            const wb = XLSX.utils.book_new();
            const wsData = [
                ["大量科技股份有限公司 - 加班申請單"],
                [`日期: ${document.getElementById('doc_date').value}`],
                ["工號", "姓名", "日期(類型)", "開始", "結束", "時數", "工作內容", "備註"],
                ...dataRows
            ];
            const ws = XLSX.utils.aoa_to_sheet(wsData);
            XLSX.utils.book_append_sheet(wb, ws, "OT_Report");
            XLSX.writeFile(wb, `加班單_${document.getElementById('doc_date').value}.xlsx`);
        };

        // 匯出圖片
        window.exportToImage = function() {
            const area = document.getElementById('capture-area');
            html2canvas(area, { scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `加班單_${document.getElementById('doc_date').value}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        };
    </script>
</body>
</html>
